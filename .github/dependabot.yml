version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Kolkata"

    commit-message:
      prefix: "deps(frontend)"

    labels:
      - dependencies
      - frontend

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "daily"
      time: "06:10"
      timezone: "Asia/Kolkata"

    commit-message:
      prefix: "deps(backend)"

    labels:
      - dependencies
      - backend

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:20"
      timezone: "Asia/Kolkata"

    commit-message:
      prefix: "ci"

    labels:
      - github-actions
